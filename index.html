<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loader</title>
<style>
body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
input, textarea, button { width: 90%; max-width: 400px; padding: 12px; margin: 8px 0; font-family: monospace; }
button { background: #fff; color: #000; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
</style>
</head>
<body>
<script>
const p = new URLSearchParams(window.location.search);
if (p.has('s')) {
document.documentElement.style.display = 'none';
window.location.replace(p.get('d') || 'https://google.com');
}
</script>
<div>
<h2>URL & Script Generator</h2>
<input type="text" id="d" placeholder="https://google.com">
<textarea id="s" rows="6" placeholder="print('Hello World')"></textarea>
<button onclick="g()">GENERATE & COPY LINK</button>
</div>
<script>
function g() {
let d = document.getElementById('d').value || 'https://google.com';
if (!/^https?:\/\//i.test(d)) d = 'https://' + d;
let s = document.getElementById('s').value || "print('Hello World')";
let u = window.location.origin + window.location.pathname + '?d=' + encodeURIComponent(d) + '&s=' + encodeURIComponent(s);
navigator.clipboard.writeText(u);
}
</script>
</body>
</html>
